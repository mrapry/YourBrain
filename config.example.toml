# YourBrain configuration example.
# Copy to your data directory as `config.toml`:
#   Windows : %APPDATA%\yourbrain\config.toml
#   Linux   : ~/.yourbrain/config.toml
#   macOS   : ~/.yourbrain/config.toml
# Every field is optional; omitted fields fall back to the defaults shown here.

[general]
author = "me"              # attributed as the memory author
default_room = "auto"      # room auto-detection (see ADR-12)
default_scope = "personal" # personal | team
language = "auto"

[storage]
data_dir = "~/.yourbrain"
backup_enabled = true
max_backups = 7

[embedding]
# Default is the dependency-free deterministic embedder (no ONNX toolchain
# required). The dimension is LOCKED into the database on first use (ADR-5), so
# switching models requires `yb reindex` (re-embeds all memories).
provider = "local"
model = "hash-bow-v1"
dimension = 256
#
# ONNX sentence-transformer backend (proper semantic understanding). Requires a
# binary built with `--features onnx`; the model is downloaded from HuggingFace
# on first use and cached on disk. `dimension` is derived from the model.
#   provider = "onnx"
#   model = "multilingual-e5-small"   # 384d, multilingual (ID+EN). Also:
#                                     # all-minilm-l6-v2, bge-small-en-v1.5,
#                                     # multilingual-e5-base (768d),
#                                     # paraphrase-multilingual-minilm-l12-v2
#   cache_dir = "~/.yourbrain/models" # optional model cache location
#
# Migration flow (run once, MCP server stopped):
#   yb reindex --provider onnx --model multilingual-e5-small --yes

[search]
default_limit = 5
min_confidence = 0.3
include_archived = false
rrf_k = 60.0               # Reciprocal Rank Fusion constant

[recall]
max_tokens = 200          # token budget injected into AI context
default_detail = "summary" # headline | summary | full

[conflict]
enabled = true
judge_tier = "auto"        # auto | rules | bundled | llm (ADR-3)
# Candidate similarity threshold. Tuned for the default hash embedder; raise to
# ~0.75 when using a real sentence-transformer via the ONNX backend.
similarity_threshold = 0.45
auto_supersede_threshold = 0.92
auto_duplicate_threshold = 0.95
auto_complement_threshold = 0.80
conflict_expiry_secs = 300 # pending conflicts auto-expire after this
candidate_top_k = 5

[compression]
intensity = "full"         # lite | full | ultra
preserve_code = true
preserve_paths = true
preserve_urls = true

[privacy]
redact_secrets = true
exclude_patterns = ["**/.env", "**/.env.*", "**/secrets/**", "**/*.pem", "**/*.key"]

[daemon]
idle_shutdown_secs = 600
embed_batch_size = 10

[rerank]
# Lexical (BM25-style) reranking on top of hybrid RRF fusion. Set enabled=false
# to restore the exact v0.1.0 recall ordering.
enabled = true
candidate_pool_factor = 4  # fetch limit*factor candidates before reranking
lexical_weight = 0.5       # blend of lexical vs fused/metadata score (0..1)

[token_budget]
# Dynamic compression of recalled memories to fit a tighter token budget.
# Disabled by default; enable per call via the `dynamic_budget` MCP argument or
# `yb recall --dynamic-budget`.
enabled = false
strategy = "extractive"    # "extractive" | "ultra"
max_tokens = 0             # budget saat recall; 0 = pakai recall.max_tokens.
                           # Di-override oleh nilai eksplisit --budget / arg MCP token_budget.

[guardrail]
# Fact-checking of a drafted answer against the knowledge base (yb_validate).
support_threshold = 0.35   # min evidence score for a claim to count as supported
evidence_top_k = 5

[cache]
# Layered semantic cache grounded in the knowledge base.
# These thresholds are DEFAULTS. They can be overridden per-project via the
# mcp.json launch flags (`yb mcp --cache-similarity/--cache-kb-direct/
# --cache-kb-grounding`) or per-call via the `yb_cache_get` arguments
# (`similarity_threshold`, `kb_direct_threshold`, `kb_grounding_threshold`) /
# `yb cache get --threshold`. Precedence: per-call > mcp.json flag > this config.
enabled = true
similarity_threshold = 0.85  # Tier 1: Q&A cache hit
kb_direct_threshold = 0.80   # Tier 2: answer directly from KB (bypass LLM)
kb_grounding_threshold = 0.50 # Tier 3: return KB as grounding context
use_kb = true                # false = Tier 1 only (no KB grounding)
ttl_secs = 3600
max_entries = 500
